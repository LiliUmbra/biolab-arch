        filter.connect(masterGain);
        masterGain.connect(audioCtx.destination);
        noise.start();
    }

    function startSystem() {
        initAudio();
        initScreen.classList.add('hidden');
        bootScreen.classList.remove('hidden');
        bootScreen.classList.add('flex');
        playBeep(200, 'sawtooth', 0.5, 0.1);
        runBoot();
        startGlitchLoop();
    }

    function runBoot() {
        if (bootStep < bootSequence.length) {
            const line = document.createElement('div');
            line.className = 'mb-2';
            bootScreen.appendChild(line);
            const fullText = bootSequence[bootStep];
            let i = 0;
            const typeInterval = setInterval(() => {
                line.textContent = fullText.substring(0, i + 1) + (i < fullText.length - 1 ? ' █' : '');
                playBeep(800 + Math.random()*200, 'square', 0.02, 0.02);
                i++;
                if (i === fullText.length) {
                    clearInterval(typeInterval);
                    line.textContent = fullText;
                    bootStep++;
                    setTimeout(runBoot, 800);
                }
            }, 30);
        } else {
            bootScreen.classList.remove('flex');
            bootScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');
            appScreen.classList.add('flex');
            treeItemCount = 0;
            renderTree();
        }
    }

    function startGlitchLoop() {
        setInterval(() => {
            if (Math.random() > 0.96) {
                document.body.classList.add('sys-glitch');
                playBeep(150, 'sawtooth', 0.1, 0.1);
                setTimeout(() => { document.body.classList.remove('sys-glitch'); }, 100 + Math.random() * 200);
            }
        }, 2000);
    }

    function handleItemClick(id, isFolderToggle = false) {
        const item = fileSystem.find(f => f.id === id);
        if (!item) return;

        if (item.password && !unlockedItems.includes(item.id)) {
            playBeep(200, 'sawtooth', 0.2, 0.1);
            pendingUnlockId = id;
            pwdInput.value = '';
            pwdError.classList.add('hidden');
            pwdModal.classList.remove('hidden');
            pwdModal.classList.add('flex');
            pwdInput.focus();
            return;
        }

        if (isFolderToggle && item.type === 'folder') {
            playBeep(600, 'sine', 0.05, 0.03);
            if (expandedFolders.includes(id)) {
                expandedFolders = expandedFolders.filter(f => f !== id);
            } else {
                expandedFolders.push(id);
            }
            treeItemCount = 0;
            renderTree();
        } else if (item.type === 'file') {
            playBeep(900, 'sine', 0.05, 0.03);
            selectedFileId = id;
            treeItemCount = 0;
            renderTree();
            renderFile();
        }
    }

    pwdInput.addEventListener('keydown', (e) => {
        playBeep(400, 'triangle', 0.01, 0.01);
        if (e.key === 'Enter') {
            const item = fileSystem.find(f => f.id === pendingUnlockId);
            if (item && item.password.toUpperCase() === pwdInput.value.toUpperCase()) {
                playBeep(800, 'square', 0.1, 0.1);
                playBeep(1200, 'square', 0.1, 0.1);
                unlockedItems.push(item.id);
                pwdModal.classList.add('hidden');
                pwdModal.classList.remove('flex');
                handleItemClick(item.id, true);
            } else {
                playBeep(150, 'sawtooth', 0.3, 0.1);
                pwdError.classList.remove('hidden');
                pwdInput.value = '';
            }
        } else if (e.key === 'Escape') {
            closePwdModal();
        }
    });

    function closePwdModal() {
        pwdModal.classList.add('hidden');
        pwdModal.classList.remove('flex');
        pendingUnlockId = null;
    }

    document.addEventListener('click', function(e) {
        if (!e.target) return;
        const targetEl = e.target.nodeType === 3 ? e.target.parentNode : e.target;
        if (!targetEl || !targetEl.closest) return;
        
        if (targetEl.closest('.arg-glitch-link')) {
            playBeep(100, 'sawtooth', 0.8, 0.2);
            document.body.classList.add('sys-glitch', 'invert', 'sepia', 'hue-rotate-[300deg]');
            setTimeout(() => { document.body.classList.remove('sys-glitch', 'invert', 'sepia', 'hue-rotate-[300deg]'); }, 1000);
        }
        
        const revealEl = targetEl.closest('.arg-reveal');
        if (revealEl) {
            playBeep(100, 'sawtooth', 0.8, 0.3);
            document.body.classList.add('sys-glitch', 'invert', 'sepia', 'hue-rotate-[300deg]');
            setTimeout(() => { document.body.classList.remove('sys-glitch', 'invert', 'sepia', 'hue-rotate-[300deg]'); }, 500);
            const secret = revealEl.getAttribute('data-secret');
            fileContentDiv.innerHTML = secret;
            setupDynamics();
        }

        if (targetEl.closest('.arg-screamer')) {
            playBeep(50, 'sawtooth', 1.5, 1);
            screamerOverlay.classList.remove('hidden');
            screamerOverlay.classList.add('screamer-flash');
            setTimeout(() => { 
                screamerOverlay.classList.add('hidden'); 
                screamerOverlay.classList.remove('screamer-flash');
            }, 1500);
        }
        
        const audioBtn = targetEl.closest('.arg-audio-log');
        if (audioBtn) {
            const btn = audioBtn;
            const output = btn.nextElementSibling;
            const lines = btn.getAttribute('data-text').split('|');
            const revealId = btn.getAttribute('data-reveal');
            let idx = 0;
            btn.disabled = true;
            btn.classList.add('opacity-50');
            output.innerHTML = '';
            playBeep(200, 'sawtooth', lines.length * 2, 0.05);
            const intId = setInterval(() => {
                if (idx < lines.length) {
                    output.innerHTML += '<div>' + lines[idx] + '</div>';
                    playBeep(600, 'triangle', 0.1, 0.05);
                    idx++;
                } else {
                    clearInterval(intId);
                    btn.disabled = false;
                    btn.classList.remove('opacity-50');
                    if (revealId) {
                        const r = document.getElementById(revealId);
                        if (r) {
                            r.classList.remove('hidden');
                            setupDynamics();
                        }
                    }
                }
            }, 2000);
            dynamicIntervals.push(intId);
        }
    });

    document.addEventListener('mousedown', function(e) {
        if (!e.target) return;
        const targetEl = e.target.nodeType === 3 ? e.target.parentNode : e.target;
        if (!targetEl || !targetEl.closest) return;

        const scannerEl = targetEl.closest('.arg-scanner');
        if (scannerEl) {
            scannerProg = 0;
            scannerEl.style.setProperty('--progress', '0%');
            scannerInt = setInterval(() => {
                scannerProg += 5;
                scannerEl.style.setProperty('--progress', scannerProg + '%');
                playBeep(300 + (scannerProg * 5), 'sine', 0.05, 0.05);
                if (scannerProg >= 100) {
                    clearInterval(scannerInt);
                    playBeep(150, 'sawtooth', 0.5, 0.2);
                    scannerEl.innerHTML = scannerEl.getAttribute('data-secret');
                    scannerEl.classList.remove('arg-scanner', 'cursor-pointer');
                    scannerEl.classList.add('text-red-500');
                    scannerEl.style.setProperty('--progress', '0%');
                }
            }, 100);
        }
    });

    document.addEventListener('mouseup', stopScanner);
    document.addEventListener('mouseleave', stopScanner);

    function stopScanner(e) {
        if (scannerInt) {
            clearInterval(scannerInt);
            scannerInt = null;
            if (scannerProg < 100) {
                document.querySelectorAll('.arg-scanner').forEach(el => el.style.setProperty('--progress', '0%'));
                playBeep(200, 'sawtooth', 0.1, 0.05);
            }
            scannerProg = 0;
        }
    }

    document.addEventListener('input', function(e) {
        if (!e.target || !e.target.classList) return;

        if (e.target.classList.contains('arg-possessed')) {
            const msg = e.target.getAttribute('data-msg');
            const currLen = e.target.value.length;
            if (currLen <= msg.length) {
                e.target.value = msg.substring(0, currLen);
            } else {
                e.target.value = msg;
            }
            playBeep(300, 'sawtooth', 0.05, 0.05);
        }
        
        if (e.target.classList.contains('interro-input')) {
            const container = e.target.closest('.arg-interrogation');
            const answer = container.getAttribute('data-answer');
            const target = container.getAttribute('data-target');
            if (e.target.value.toUpperCase() === answer.toUpperCase()) {
                playBeep(1000, 'sine', 0.2, 0.1);
                e.target.disabled = true;
                const targetEl = document.getElementById(target);
                if (targetEl) targetEl.classList.remove('hidden');
            }
        }
    });

    function cleanupDynamics() {
        dynamicIntervals.forEach(clearInterval);
        dynamicIntervals = [];
    }

    function setupDynamics() {
        const paranoias = document.querySelectorAll('.arg-paranoia');
        paranoias.forEach(p => {
            const orig = p.textContent;
            const truth = p.getAttribute('data-true');
            const intId = setInterval(() => {
                if (Math.random() > 0.8) {
                    p.textContent = truth;
                    p.classList.add('text-red-500', 'font-bold');
                    setTimeout(() => { p.textContent = orig; p.classList.remove('text-red-500', 'font-bold'); }, 200);
                }
            }, 3000);
            dynamicIntervals.push(intId);
        });

        const radars = document.querySelectorAll('.arg-radar');
        radars.forEach(r => {
            let dist = 35;
            const intId = setInterval(() => {
                dist -= Math.floor(Math.random() * 4);
                if(dist < 0) dist = 0;
                r.textContent = "[RADAR] ANOMALIE DÉTECTÉE À : " + dist + " MÈTRES";
                playBeep(1200 - (dist*10), 'sine', 0.1, 0.05);
            }, 1500);
            dynamicIntervals.push(intId);
        });

        const ghosts = document.querySelectorAll('.arg-ghost-typing');
        ghosts.forEach(g => {
            const text = g.getAttribute('data-text');
            g.textContent = '';
            let i = 0;
            const intId = setInterval(() => {
                if (i < text.length) {
                    g.textContent += text.charAt(i);
                    playBeep(400, 'triangle', 0.05, 0.02);
                    i++;
                } else {
                    clearInterval(intId);
                }
            }, 100);
            dynamicIntervals.push(intId);
        });

        const countdowns = document.querySelectorAll('.arg-countdown');
        countdowns.forEach(c => {
            let time = parseInt(c.getAttribute('data-time') || '60');
            const intId = setInterval(() => {
                time--;
                if(time < 0) time = 0;
                const m = Math.floor(time / 60).toString().padStart(2, '0');
                const s = (time % 60).toString().padStart(2, '0');
                c.textContent = "TEMPS RESTANT : " + m + ":" + s;
                if (time <= 10) playBeep(200, 'sawtooth', 0.1, 0.1);
            }, 1000);
            dynamicIntervals.push(intId);
        });
    }

    function createTreeHtml(parentId, level = 0) {
        const items = fileSystem.filter(f => f.parentId === parentId);
        let html = '';
        items.forEach(item => {
            if (item.isGhost) return;

            const isExpanded = expandedFolders.includes(item.id);
            const isSelected = selectedFileId === item.id;
            const padding = level * 16;
            const delay = treeItemCount * 0.05;
            treeItemCount++;
            
            let lockHtml = '';
            if (item.password) {
                if (unlockedItems.includes(item.id)) {
                    lockHtml = '<i data-lucide="unlock" class="w-3 h-3 ml-2 opacity-50"></i>';
                } else {
                    lockHtml = '<i data-lucide="lock" class="w-3 h-3 ml-2 text-red-500"></i>';
                }
            }

            if (item.type === 'folder') {
                html += '<div class="tree-anim" style="margin-left: ' + padding + 'px; animation-delay: ' + delay + 's;">' +
                    '<div class="folder-item" onclick="handleItemClick(\'' + item.id + '\', true)">' +
                        '<i data-lucide="' + (isExpanded ? 'chevron-down' : 'chevron-right') + '" class="chevron"></i>' +
                        '<i data-lucide="folder" class="icon"></i>' +
                        '<span class="truncate">' + item.name + '</span>' +
                        lockHtml +
                    '</div>' +
                    (isExpanded ? createTreeHtml(item.id, level + 1) : '') +
                '</div>';
            } else {
                html += '<div class="tree-anim" style="margin-left: ' + padding + 'px; animation-delay: ' + delay + 's;">' +
                    '<div class="folder-item ' + (isSelected ? 'selected' : '') + '" onclick="handleItemClick(\'' + item.id + '\')">' +
                        '<span style="width: 20px; display: inline-block;"></span>' +
                        '<i data-lucide="file-text" class="icon"></i>' +
                        '<span class="truncate">' + item.name + '</span>' +
                        lockHtml +
                    '</div>' +
                '</div>';
            }
        });
        return html;
    }

    function renderTree() {
        document.getElementById('tree-container').innerHTML = createTreeHtml(null);
        lucide.createIcons();
    }

    function renderFile() {
        cleanupDynamics();
        const file = fileSystem.find(f => f.id === selectedFileId);
        const fileHeader = document.getElementById('file-header');
        const noFile = document.getElementById('no-file');
        
        if (file) {
            document.getElementById('file-title').textContent = file.name;
            document.getElementById('file-date').textContent = 'DERNIÈRE MODIFICATION: ' + file.date;
            fileContentDiv.innerHTML = file.content || '';
            fileHeader.classList.remove('hidden');
            fileContentDiv.classList.remove('hidden');
            noFile.classList.add('hidden');

            setupDynamics();

            if (file.content && file.content.includes('[FATAL_EXCEPTION_')) {
                playBeep(100, 'sawtooth', 0.8, 0.2);
                document.body.classList.add('sys-glitch', 'invert', 'sepia', 'hue-rotate-[300deg]');
                setTimeout(() => { document.body.classList.remove('sys-glitch', 'invert', 'sepia', 'hue-rotate-[300deg]'); }, 1000);
            }
            lucide.createIcons();
        } else {
            fileHeader.classList.add('hidden');
            fileContentDiv.classList.add('hidden');
            noFile.classList.remove('hidden');
        }
    }
</script>
</body>
